services:
  - type: web
    name: statement-converter-backend
    runtime: python
    buildCommand: "apt-get update && apt-get install -y ghostscript tesseract-ocr && pip install -r backend/requirements.txt"
    startCommand: "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.6"
